<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoFlix Live</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { width: 100%; height: 100%; background: #111; color: white; overflow: hidden; }

        #bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 1.2s ease-in-out;
            /* On baisse un peu le filtre pour voir si ça vient de là */
            filter: brightness(0.8); 
        }

        .live-container {
            position: relative; z-index: 10;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 10px;
        }

        .vip-section { position: relative; height: 350px; width: 100%; margin-top: 40px; }
        .seat { position: absolute; display: flex; flex-direction: column; align-items: center; width: 110px; }
        .pos-1 { top: 50%; left: 50%; transform: translate(-50%, -50%); } 
        .pos-2 { top: 0; left: 5%; } .pos-3 { top: 0; right: 5%; }   
        .pos-4 { bottom: 0; left: 5%; } .pos-5 { bottom: 0; right: 5%; }

        .avatar-wrapper {
            position: relative; width: 85px; height: 85px;
            border-radius: 50%; border: 2px solid rgba(255, 215, 0, 0.4);
            background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
        }

        .pos-1 .avatar-wrapper { width: 120px; height: 120px; border: 3px solid #FFD700; }
        .crown-overlay { position: absolute; top: -15%; left: -15%; width: 130%; height: 130%; z-index: 5; }

        .audience-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; padding: 10px; margin-bottom: 50px; }
        .mini-seat { width: 55px; height: 55px; border: 2px solid #ff4444; border-radius: 50%; background: rgba(0,0,0,0.7); }
        .pts { background: linear-gradient(180deg, #FFD700, #FFA500); color: black; font-weight: bold; font-size: 10px; padding: 1px 7px; border-radius: 10px; margin-top: 4px; }
        .name { font-size: 11px; margin-top: 2px; text-shadow: 1px 1px 2px #000; font-weight: bold; }
    </style>
</head>
<body>

    <div id="bg-container"></div>

    <div class="live-container">
        <div class="vip-section">
            <div class="seat pos-1">
                <div class="avatar-wrapper">
                    <img src="https://raw.githubusercontent.com/Draziel-creator/CongoFlix-/main/assets/OUI.png" class="crown-overlay">
                    <img src="https://via.placeholder.com/100" style="width:85%; height:85%; border-radius:50%; object-fit:cover;">
                </div>
                <span class="name">Hôte</span>
                <div class="pts">3.45M</div>
            </div>
            <div class="seat pos-2"><div class="avatar-wrapper"></div><span class="name">Draziel</span><div class="pts">2.25M</div></div>
            <div class="seat pos-3"><div class="avatar-wrapper"></div><span class="name">NitaK</span><div class="pts">1.89M</div></div>
            <div class="seat pos-4"><div class="avatar-wrapper"></div><span class="name">Tari</span><div class="pts">1.56M</div></div>
            <div class="seat pos-5"><div class="avatar-wrapper"></div><span class="name">Samuka</span><div class="pts">1.23M</div></div>
        </div>
        <div class="audience-grid" id="audience-box"></div>
    </div>

        ];

        // On nettoie les liens pour avoir la haute qualité et éviter le cache
        const bgList = rawList.map(url => url.replace('/s320/', '/s1600/') + "?v=" + Math.random());

        let currentBg = 0;
        const bgContainer = document.getElementById('bg-container');

        function changeBg() {
            const nextImg = new Image();
            nextImg.src = bgList[currentBg];
            nextImg.onload = () => {
                bgContainer.style.backgroundImage = `url('${bgList[currentBg]}')`;
                currentBg = (currentBg + 1) % bgList.length;
            };
        }

        setInterval(changeBg, 7000); 
        changeBg();

        const audienceBox = document.getElementById('audience-box');
        for (let i = 6; i <= 15; i++) {
            audienceBox.innerHTML += `
                <div style="display:flex; flex-direction:column; align-items:center;">
                    <div class="mini-seat"></div>
                    <span class="name" style="font-size:9px;">P${i}</span>
                    <div class="pts" style="background:#444; color:white; font-size:8px;">0K</div>

        }
